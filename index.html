<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>位移必吃排行榜</title>
  <style>
    .row {
      display: flex;
      align-items: center;
      border-bottom: 2px solid black;
      height: 90px;
    }

    .label {
      width: 120px;
      text-align: center;
      font-weight: bold;
    }

    /* 分级颜色 */
    .level-6 { background: red; position: relative; top: -10px; }
    .level-5 { background: orange; }
    .level-4 { background: yellow; }
    .level-3 { background: #fff176; }
    .level-2 { background: #eee; }
    .level-1 { background: #ddd; }

    .items {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding-left: 10px;
    }

    .card img {
      width: 60px;
      height: 60px;
      object-fit: cover;
      border: 1px solid black;
      cursor: pointer;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
</head>

<body>

<div id="loginBox">
  <h3>请输入用户名</h3>
  <input id="usernameInput">
  <button onclick="setUsername()">进入</button>
</div>

<div id="main" style="display:none">

  <div style="margin-bottom:10px;border-bottom:1px solid #000;padding-bottom:5px">
    当前用户：<span id="currentUser" style="font-weight:bold;color:red"></span>
    <button onclick="changeUser()">切换账号</button>
    <button onclick="logout()">退出</button>
  </div>

  <h2>位移必吃榜</h2>
  <div id="rankBoard"></div>

  <hr>

  <h3>添加餐厅</h3>
  <input id="name" placeholder="店名"><br><br>
  <label>上传门店图片：</label>
  <input type="file" id="imgFile" accept="image/*"><br><br>
  <input id="msg" placeholder="评价"><br><br>

  <div style="margin-bottom: 10px;">
    评分：
    <button onclick="setScore(6)">夯爆了</button>
    <button onclick="setScore(5)">夯</button>
    <button onclick="setScore(4)">顶级</button>
    <button onclick="setScore(3)">人上人</button>
    <button onclick="setScore(2)">NPC</button>
    <button onclick="setScore(1)">拉完了</button>
  </div>

  <button onclick="addRestaurant()">提交</button>

</div>

<div id="modal" style="
  display:none;
  position:fixed;
  top:20%;
  left:30%;
  width:40%;
  background:#fff;
  padding:20px;
  border:2px solid #000;
  z-index:1000">

  <div id="modalContent"></div>

  <hr>
  <h3>你的评价</h3>
  <div id="scoreBtns" style="margin-bottom: 10px;"></div>

  <input id="commentInput" placeholder="说点什么..." style="width: 70%; margin-bottom: 10px;">
  <button onclick="submitRating()">发送</button>

  <br><br>
  <button onclick="closeModal()">关闭</button>

</div>

<script>
// 初始化 Supabase
const SUPABASE_URL = "https://awqqwkxidmoubltinagf.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF3cXF3a3hpZG1vdWJsdGluYWdmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5NDA1NDQsImV4cCI6MjA5MjUxNjU0NH0.cHGFLfy_XEppXuYt-eUhijky4f9qty-3W5AL0mCHeOE";
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// 等级字典
const levelMap = {
  6: "夯爆了", 5: "夯", 4: "顶级", 3: "人上人", 2: "NPC", 1: "拉完了"
};

// 用户管理
let username = localStorage.getItem("user");

function setUsername() {
  const val = document.getElementById("usernameInput").value.trim();
  if (!val) { alert("必须输入用户名"); return; }
  localStorage.setItem("user", val);
  location.reload();
}

function logout() {
  localStorage.removeItem("user");
  location.reload();
}

function changeUser() {
  const val = prompt("输入新用户名");
  if (!val || !val.trim()) { alert("不能为空"); return; }
  localStorage.setItem("user", val.trim());
  location.reload();
}

if (username) {
  document.getElementById("loginBox").style.display = "none";
  document.getElementById("main").style.display = "block";
  document.getElementById("currentUser").innerText = username;
  load();
}

let currentScore = null;
let currentRestaurant = null;
window.ALL = [];

// 主界面添加餐厅的评分选择
function setScore(s) {
  currentScore = s;
  alert("已选择：" + levelMap[s]);
}

// 加载并渲染数据
async function load() {
  const { data: restaurants } = await db.from("restaurants").select("*");
  const { data: ratings } = await db.from("ratings").select("*");

  const merged = restaurants.map(r => {
    const rs = ratings.filter(x => String(x.restaurant_id) == String(r.id));
    const avg = rs.length ? Math.round(rs.reduce((s, x) => s + x.score, 0) / rs.length) : null;
    return { ...r, avg, ratings: rs };
  });

  merged.sort((a, b) => (b.avg || 0) - (a.avg || 0));
  window.ALL = merged;

  const levels = [6, 5, 4, 3, 2, 1];
  const html = levels.map(level => {
    const list = merged.filter(r => r.avg === level);
    return `
      <div class="row level-${level}">
        <div class="label">${levelMap[level]}</div>
        <div class="items">
          ${list.map(r => `
            <div class="card" onclick="openDetail('${r.id}')">
              <img src="${r.image || 'https://via.placeholder.com/60'}" title="${r.name}">
            </div>
          `).join("")}
        </div>
      </div>
    `;
  }).join("");

  document.getElementById("rankBoard").innerHTML = html;
}

// 添加餐厅（包含图片上传逻辑）
async function addRestaurant() {
  const nameVal = document.getElementById("name").value.trim();
  const msgVal = document.getElementById("msg").value.trim();
  const fileInput = document.getElementById("imgFile");
  const file = fileInput.files[0];

  if (!nameVal) {
    alert("店名不能为空");
    return;
  }
  if (!currentScore) {
    alert("必须在上方按钮选择一个评分");
    return;
  }

  let imgUrl = "";

  // 处理图片上传
  if (file) {
    const fileName = `${Date.now()}_${file.name}`;
    const { data: uploadData, error: uploadError } = await db.storage
      .from('images')
      .upload(fileName, file);

    if (uploadError) {
      alert("图片上传失败：" + uploadError.message);
      return;
    }

    const { data: publicUrlData } = db.storage.from('images').getPublicUrl(fileName);
    imgUrl = publicUrlData.publicUrl;
  }

  // 插入餐厅数据
  const { data } = await db.from("restaurants").insert({
    name: nameVal,
    image: imgUrl,
    creator: username,
    creator_msg: msgVal
  }).select();

  const r = data[0];

  // 插入初始评分数据
  await db.from("ratings").insert({
    restaurant_id: r.id,
    user: username,
    score: currentScore,
    comment: msgVal
  });

  location.reload();
}

// 打开详情弹窗
function openDetail(id) {
  const r = ALL.find(x => x.id == id);
  currentRestaurant = id;

  document.getElementById("modal").style.display = "block";

  document.getElementById("modalContent").innerHTML = `
    <h3>${r.name}</h3>
    <p>综合评分：${levelMap[r.avg] || "暂无"}</p>
    <p>创建者：${r.creator || "未知"}</p>
    <p>创建者寄语：${r.creator_msg || "无"}</p>
    <hr>
    ${r.ratings.map(x => `
      <div style="margin-bottom:5px;"><strong>${x.user}</strong>：${levelMap[x.score]} - ${x.comment || "无留言"}</div>
    `).join("")}
  `;

  // 生成单选框
  document.getElementById("scoreBtns").innerHTML = Object.entries(levelMap)
    .reverse()
    .map(([s, l]) => `<label style="margin-right:10px; cursor:pointer;"><input type="radio" name="modalScore" value="${s}"> ${l}</label>`)
    .join("");

  document.getElementById("commentInput").value = "";
}

// 弹窗内提交新评分
async function submitRating() {
  const selectedScore = document.querySelector('input[name="modalScore"]:checked');
  if (!selectedScore) {
    alert("请先选择一个评分！");
    return;
  }

  const score = parseInt(selectedScore.value);
  const comment = document.getElementById("commentInput").value.trim();

  await db.from("ratings").insert({
    restaurant_id: currentRestaurant,
    user: username,
    score: score,
    comment: comment
  });

  location.reload();
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}
</script>
</body>
</html>
